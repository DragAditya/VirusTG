services:
  - type: web                          # ← Web Service (free tier)
    name: vt-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false                    # Set in Render dashboard manually
      - key: VT_API_KEY
        sync: false                    # Set in Render dashboard manually
      - key: RENDER_URL
        sync: false                    # e.g. https://vt-telegram-bot.onrender.com
      - key: PORT
        value: "8080"
      - key: MAX_FILE_SIZE_MB
        value: "32"
      - key: PYTHON_VERSION
        value: "3.11.0"
